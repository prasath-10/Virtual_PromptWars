services:
  # Backend Web Service
  - type: web
    name: electiq-backend
    env: node
    rootDir: electiq/server
    plan: free
    buildCommand: bash ./render-build.sh
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"

  # Frontend Static Site
  - type: static_site
    name: electiq-frontend
    env: static
    rootDir: electiq/frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://electiq-backend.onrender.com
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_GOOGLE_TTS_API_KEY
        sync: false
